<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website</title>
    <style>
        body {
            font-size: 18px; /* Increased from 16px to 18px */
        }
        nav a {
            font-size: 14px; /* Increased from 11px to 14px */
        }
        .hero-label {
            font-size: 13px; /* Increased from 10px to 13px */
        }
        .hero-tagline {
            font-size: 15px; /* Increased from 12px to 15px */
        }
        .hero-cta {
            font-size: 14px; /* Increased from 11px to 14px */
        }
        .about-right p {
            font-size: 16px; /* Increased from 13px to 16px */
        }
        .section-label {
            font-size: 13px; /* Increased from 10px to 13px */
        }
        .section-num {
            font-size: 13px; /* Increased from 10px to 13px */
        }
        .exp-date {
            font-size: 13px; /* Increased from 10px to 13px */
        }
        .exp-title {
            font-size: 24px; /* Increased from 20px to 24px */
        }
        .exp-org {
            font-size: 14px; /* Increased from 11px to 14px */
        }
        .exp-desc {
            font-size: 14px; /* Increased from 11px to 14px */
        }
        .pub-venue {
            font-size: 13px; /* Increased from 10px to 13px */
        }
        .pub-title {
            font-size: 21px; /* Increased from 18px to 21px */
        }
        .pub-authors {
            font-size: 14px; /* Increased from 11px to 14px */
        }
        .contact-info a {
            font-size: 15px; /* Increased from 12px to 15px */
        }
        .field label {
            font-size: 13px; /* Increased from 10px to 13px */
        }
        .field input,
        .field textarea {
            font-size: 16px; /* Increased from 13px to 16px */
        }
        footer p {
            font-size: 14px; /* Increased from 11px to 14px */
        }
        footer-links a {
            font-size: 14px; /* Increased from 11px to 14px */
        }
    </style>
</head>
<body>
    <nav>
        <!-- Navigation links -->
    </nav>
    <div class="hero">
        <span class="hero-label">Hero Label</span>
        <h2 class="hero-tagline">Tagline Here</h2>
        <button class="hero-cta">Call to Action</button>
    </div>
    <div class="about">
        <div class="about-right">
            <p>About content goes here.</p>
        </div>
    </div>
    <div class="section">
        <span class="section-label">Section Label</span>
        <span class="section-num">1</span>
    </div>
    <div class="experience">
        <span class="exp-date">01/2022</span>
        <span class="exp-title">Experience Title</span>
        <span class="exp-org">Organization</span>
        <p class="exp-desc">Description of roles.</p>
    </div>
    <div class="publication">
        <span class="pub-venue">Venue</span>
        <h3 class="pub-title">Publication Title</h3>
        <p class="pub-authors">Author Name</p>
    </div>
    <div class="contact-info">
        <a href="mailto:example@example.com">Contact Us</a>
    </div>
    <div class="field">
        <label for="input">Field Label</label>
        <input type="text" id="input">
        <textarea></textarea>
    </div>
    <footer>
        <p>Footer content here.</p>
        <nav class="footer-links">
            <a href="#">Footer Link</a>
        </nav>
    </footer>
</body>
</html>
